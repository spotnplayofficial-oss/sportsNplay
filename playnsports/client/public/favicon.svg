<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6effa0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />
  <circle cx="50" cy="50" r="48" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>

  <!-- 3D Block Letter P -->
  <!-- Bottom/side face (dark green - gives 3D depth) -->
  <path d="M 28 72 L 34 78 L 34 38 L 28 32 Z" fill="url(#sideGrad)" />
  <path d="M 34 78 L 60 78 L 64 74 L 60 72 L 34 72 Z" fill="#166534" />
  <!-- Bump side for P arch -->
  <path d="M 34 52 L 38 56 L 58 56 L 62 52 L 62 38 L 58 34 L 34 34 L 34 38 L 58 38 L 58 52 L 34 52 Z" fill="#15803d" opacity="0.6"/>

  <!-- Top face of 3D block -->
  <path d="M 28 32 L 34 38 L 58 38 L 52 32 Z" fill="url(#topGrad)" opacity="0.9"/>
  <path d="M 52 32 L 58 38 L 62 34 L 56 28 Z" fill="#86efac" opacity="0.7"/>

  <!-- Main front face - letter P -->
  <rect x="28" y="32" width="6" height="40" fill="url(#greenGrad)" filter="url(#glow)" rx="1"/>

  <!-- P arch front face -->
  <path d="M 34 32 L 52 32 Q 66 32 66 42 Q 66 52 52 52 L 34 52 Z" fill="url(#greenGrad)" filter="url(#glow)"/>

  <!-- P arch hole (cutout) -->
  <path d="M 34 37 L 51 37 Q 60 37 60 42 Q 60 47 51 47 L 34 47 Z" fill="url(#bgGrad)"/>

  <!-- Shine/highlight on P -->
  <path d="M 30 34 L 32 34 L 32 68 L 30 68 Z" fill="white" opacity="0.15" rx="1"/>
  <path d="M 34 34 L 53 34 Q 58 34 60 37 L 36 37 Z" fill="white" opacity="0.2"/>

  <!-- Glow dot bottom right -->
  <circle cx="72" cy="72" r="5" fill="#4ade80" opacity="0.6" filter="url(#glow)"/>
  <circle cx="72" cy="72" r="3" fill="#86efac"/>

  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.2"/>
</svg>
